<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Drivchoh Employees</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="app" style="display:none">

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="s-mark">D</div>
      <div>
        <div class="s-name">Drivchoh Employees</div>
        <div class="s-sub">Staff Portal</div>
      </div>
    </div>
    <nav class="sidebar-nav" id="sidebar-nav"></nav>
    <div class="sidebar-footer">
      <div class="user-card" id="user-card"></div>
      <button class="btn-signout" id="btn-signout">Sign out</button>
    </div>
  </aside>

  <!-- Mobile overlay -->
  <div class="sidebar-overlay" id="sidebar-overlay"></div>

  <!-- Main -->
  <div class="main-wrap">
    <header class="topbar">
      <button class="hamburger" id="hamburger" aria-label="Menu">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <path d="M2 4.5h14M2 9h14M2 13.5h14" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
        </svg>
      </button>
      <h1 class="page-title" id="page-title"></h1>
      <div class="topbar-right" id="topbar-actions"></div>
    </header>
    <div class="page-body" id="page-body"></div>
  </div>

</div>

<!-- Modal -->
<div class="modal-overlay" id="modal-overlay" style="display:none">
  <div class="modal" id="modal-box"></div>
</div>

<!-- Toasts -->
<div id="toast-area"></div>

<script src="app.js"></script>
</body>
</html>
